{% extends "base.html" %}
{% block title %}Kurs qo'shish | EduPlatform{% endblock %}

{% block content %}
<div class="container">
    <div class="page-header">
        <div>
            <h1>{% if editing %}Kursni tahrirlash{% else %}Yangi kurs qo'shish{% endif %}</h1>
            <p>Kurs ma'lumotlarini to'ldiring</p>
        </div>
        <a href="{% url 'admin_courses' %}" class="back-btn">← Orqaga</a>
    </div>

    <div class="form-card">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:16px;">Saqlash</button>
        </form>
    </div>
</div>
{% endblock %}
